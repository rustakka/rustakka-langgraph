name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude pylanggraph --all-targets -- -D warnings
      - run: cargo test --workspace --exclude pylanggraph

  python:
    name: pytest (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - name: Install maturin + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio
      - name: Build extension in develop mode
        run: |
          maturin develop --release -m crates/py-bindings/pylanggraph/Cargo.toml
      - name: Run pytest
        env:
          RUSTAKKA_LANGGRAPH_ENV: test
        run: |
          pytest python/tests -v

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --exclude pylanggraph --no-deps
